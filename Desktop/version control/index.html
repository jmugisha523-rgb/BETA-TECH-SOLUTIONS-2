<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Registration</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
    }

    .card {
      width: 340px;              /* reduced width */
      background: rgba(255, 255, 255, 0.95);
      padding: 18px;             /* reduced padding */
      border-radius: 8px;       /* reduced corner radius */
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
      color: #1e3c72;
      font-size: 20px;
    }

    .subtitle {
      text-align: center;
      font-size: 12px;
      color: #666;
      margin-bottom: 15px;
    }

    .form-group {
      margin-bottom: 10px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
      font-weight: 600;
      color: #333;
    }

    input, textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 5px;  /* reduced radius */
      outline: none;
      font-size: 13px;
      transition: 0.2s;
    }

    input:focus, textarea:focus {
      border-color: #2a5298;
      box-shadow: 0 0 3px rgba(42,82,152,0.3);
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;   /* reduced radius */
      background: #2a5298;
      color: white;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 5px;
    }

    button:hover {
      background: #1e3c72;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Product Registration</h2>
    <p class="subtitle">Enter product details</p>

    <form>

      <div class="form-group">
        <label>Product Name</label>
        <input type="text" placeholder="Laptop" required>
      </div>

      <div class="form-group">
        <label>Product ID</label>
        <input type="text" placeholder="PRD-001" required>
      </div>

      <div class="form-group">
        <label>Price</label>
        <input type="number" placeholder="Price" required>
      </div>

      <div class="form-group">
        <label>Quantity</label>
        <input type="number" placeholder="Quantity" required>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea rows="3" placeholder="Product description"></textarea>
      </div>

      <button type="submit">Save Product</button>

    </form>
  </div>

</body>
</html>
