<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beta Tech | Star Feedback</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
            width: 320px;
        }

        h2 { margin-top: 0; font-size: 1.5rem; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }

        /* Star Rating with Emojis */
        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .star-rating input { display: none; }

        .star-rating label {
            font-size: 2.5rem;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            filter: grayscale(100%) opacity(0.3); /* Makes unselected stars grey */
        }

        /* Hover and Selection: Makes them colorful and glow */
        .star-rating input:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            filter: grayscale(0%) opacity(1);
            transform: scale(1.2);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        textarea {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 12px;
            color: white;
            margin-bottom: 1.5rem;
            resize: none;
            box-sizing: border-box;
        }

        .btn {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #7dd3fc;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Your Rating</h2>
        <p>How many stars for Beta Tech?</p>

        <form>
            <div class="star-rating">
                <input type="radio" id="s5" name="rate" value="5"><label for="s5">⭐</label>
                <input type="radio" id="s4" name="rate" value="4"><label for="s4">⭐</label>
                <input type="radio" id="s3" name="rate" value="3"><label for="s3">⭐</label>
                <input type="radio" id="s2" name="rate" value="2"><label for="s2">⭐</label>
                <input type="radio" id="s1" name="rate" value="1"><label for="s1">⭐</label>
            </div>

            <textarea placeholder="Tell us why..." rows="3"></textarea>
            
            <button type="submit" class="btn">SUBMIT</button>
        </form>
    </div>

</body>
</html>
